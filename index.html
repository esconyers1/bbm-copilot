<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#060A12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>COPILOT — Best Ball Draft Intelligence</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #060A12; }
    #root { height: 100%; }
    #err { display:none; position:fixed; top:20px; left:20px; right:20px;
      background:#FF4E6A; color:#fff; padding:16px; border-radius:8px;
      font-family:monospace; font-size:12px; z-index:9999; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="err"></div>
  <script>
    window.onerror = function(msg,src,line,col,err){
      document.getElementById('err').style.display='block';
      document.getElementById('err').textContent='ERROR: '+msg+' (line '+line+')';
    };
  </script>
  <script src="app.js?v=2"></script>
</body>
</html>
