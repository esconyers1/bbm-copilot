name: Update ADP Data

on:
  schedule:
    - cron: '30 13 * * 1'
  workflow_dispatch:

jobs:
  update-adp:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: |
          npm init -y
          npm install react react-dom esbuild
      - name: Create output dir
        run: mkdir -p public
      - name: Fetch ADP and rebuild
        run: node scripts/update-adp.js
      - name: Copy bundle to root
        run: |
          if [ -f public/app.js ]; then
            cp public/app.js app.js
          fi
      - name: Commit if changed
        run: |
          git config user.name "ADP Bot"
          git config user.email "actions@github.com"
          git add app.js src/players-data.js
          git diff --staged --quiet || git commit -m "Auto-update ADP data $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
